name: process-check

on:
  # Allow this workflow to be invoked as a reusable workflow from ci.yml.
  # Without `workflow_call`, GitHub cannot resolve `uses: ./.github/workflows/process-check.yml`
  # and fails validation of ci.yml instantly (0 jobs, "workflow file issue").
  workflow_call:
  pull_request:
    paths:
      - "openspec/process/**"
      - ".github/workflows/process-check.yml"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-contracts:
    name: Validate process contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Validate every contract
        run: uv run python openspec/process/scripts/validate_contracts.py